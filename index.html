<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>isakparty.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #222;
      --text: #f0f0f0;
      --muted: #888;
      --accent: #ff5b24;
      --radius: 12px;
      --gap: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100dvh;
      padding: 0 var(--gap);
      padding-bottom: 64px;
    }

    header {
      padding: 48px 0 40px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    header h1 {
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      margin-top: 12px;
      color: var(--muted);
      font-size: 1rem;
    }

    ul.events {
      list-style: none;
      display: grid;
      gap: var(--gap);
    }

    .event-card a {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }

    .event-card a:hover {
      border-color: var(--accent);
      background: #1a1a1a;
    }

    .event-date {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
      min-width: 80px;
    }

    .event-name {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .event-arrow {
      margin-left: auto;
      color: var(--muted);
      font-size: 1.2rem;
    }

    .empty {
      color: var(--muted);
      font-size: 0.95rem;
      padding: 40px 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>isak<span>party</span>.com</h1>
    <p>All the events, all in one place.</p>
  </header>

  <ul class="events">
    <!-- Event cards go here. Example:
    <li class="event-card">
      <a href="/summer-party-2025/">
        <span class="event-date">June 2025</span>
        <span class="event-name">Summer Party</span>
        <span class="event-arrow">→</span>
      </a>
    </li>
    -->
    <li class="empty">No events yet — check back soon.</li>
  </ul>
</body>
</html>
